name: 'Build iOS app'

on:
    workflow_dispatch:

jobs:
    build_with_signing:
        runs-on: macos-latest
        environment: testflight-preview
        steps:
            - name: check Xcode version
              run: /usr/bin/xcodebuild -version
            - name: checkout repository
              uses: actions/checkout@v4
            - name: Install the Apple certificate and provisioning profile
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.PREVIEW_BUILD_CERT_BASE64 }}
                  P12_PASSWORD: ${{ secrets.PREVIEW_BUILD_CERT_PASSWORD }}
                  PROVISION_PROFILES_BASE64: ${{ secrets.PREVIEW_PROVISION_PROFILES_BASE64 }}
                  KEYCHAIN_PASSWORD: ${{ secrets.PREVIEW_KEYCHAIN_PASSWORD }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                  PP_ARCHIVE=$RUNNER_TEMP/mobile_pp.tgz
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                  echo -n "$PROVISION_PROFILES_BASE64" | base64 --decode -o $PP_ARCHIVE

                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

                  mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                  tar xzvf $PP_ARCHIVE -C $RUNNER_TEMP
                  for PROVISION in `ls $RUNNER_TEMP/*.mobileprovision`
                  do
                    UUID=`/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PROVISION)`
                    cp $PROVISION ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
                  done

                  security find-identity -v -p codesigning
                  ls -l ~/Library/MobileDevice/Provisioning\ Profiles

            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'yarn'

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: '3.3'

            - name: Clean workspace
              run: |
                  git clean -ffdx
                  npm cache clean --force

            - name: Restore preview environment
              env:
                  APP_ENV_BASE64: ${{ secrets.PREVIEW_APP_ENV_BASE64 }}
              run: |
                  if [ -z "$APP_ENV_BASE64" ]; then
                    echo "::error::PREVIEW_APP_ENV_BASE64 is not configured"
                    exit 1
                  fi
                  echo -n "$APP_ENV_BASE64" | base64 --decode -o .env
                  chmod 600 .env

            - name: Clean Derived Data
              run: |
                  rm -rf ~/Library/Developer/Xcode/DerivedData/*

            - name: Set Xcode build number
              run: |
                  bash scripts/increment_build_number.sh
              id: build_number

            - name: Clean Xcode Build
              run: |
                  cd ios
                  xcodebuild clean -workspace fitbox.xcworkspace -scheme fitbox

            - name: install yarn dependencies
              run: yarn install --frozen-lockfile

            - name: Validate JavaScript
              run: |
                  yarn check-types
                  yarn lint
                  yarn test --runInBand

            - name: Update Bundler and Install Gems
              run: |
                  gem install bundler -v 2.6.9
                  bundle _2.6.9_ install

            - name: Clear Bundler Cache
              run: |
                  bundle clean --force
                  rm -rf ~/.bundle/cache

            - name: Install Pod Dependencies
              run: |
                  echo "RCT_NEW_ARCH_ENABLED: $RCT_NEW_ARCH_ENABLED"
                  which bundle
                  bundle --version
                  which pod
                  pod --version
                  cd ios
                  pod repo update
                  RCT_NEW_ARCH_ENABLED=1 bundle exec pod update Sentry/HybridSDK --verbose

            - name: Configure preview app target
              run: |
                  cd ios
                  bundle exec ruby <<'RUBY'
                  require 'xcodeproj'

                  project = Xcodeproj::Project.open('fitbox.xcodeproj')
                  target = project.targets.find { |candidate| candidate.name == 'fitbox' }
                  abort 'fitbox app target was not found' unless target

                  configuration = target.build_configurations.find { |candidate| candidate.name == 'Release' }
                  abort 'fitbox Release configuration was not found' unless configuration

                  configuration.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.againfaster.fitbox.preview'
                  configuration.build_settings['INFOPLIST_KEY_CFBundleDisplayName'] = 'Fitbox Preview'
                  configuration.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'fitbox/fitbox.preview.entitlements'
                  configuration.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                  configuration.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                  configuration.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                  configuration.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'fitbox preview appstore 2026'
                  configuration.build_settings['PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]'] = 'fitbox preview appstore 2026'
                  configuration.build_settings['DEVELOPMENT_TEAM'] = '72JFN8S92U'
                  project.save
                  RUBY

            - name: build archive
              run: |
                  cd ios
                  xcodebuild -workspace fitbox.xcworkspace \
                  -scheme "fitbox" \
                  -sdk iphoneos \
                  -configuration Release \
                  -destination generic/platform=iOS \
                  -quiet \
                  -archivePath $RUNNER_TEMP/fitbox.xcarchive \
                  archive

            - name: export ipa
              env:
                  EXPORT_OPTIONS_PLIST: ${{ secrets.PREVIEW_EXPORT_OPTIONS_PLIST }}
              run: |
                  EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
                  echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH
                  xcodebuild -exportArchive -archivePath $RUNNER_TEMP/fitbox.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath $RUNNER_TEMP/build

            - name: Upload application
              uses: actions/upload-artifact@v4
              with:
                  name: FITBOX-PREVIEW
                  path: ${{ runner.temp }}/build
                  retention-days: 3

            - name: Publish to TestFlight
              env:
                  ASC_KEY_ID: ${{ secrets.PREVIEW_ASC_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.PREVIEW_ASC_ISSUER_ID }}
                  ASC_PRIVATE_KEY_BASE64: ${{ secrets.PREVIEW_ASC_PRIVATE_KEY_BASE64 }}
              run: |
                  KEY_DIR="$HOME/.appstoreconnect/private_keys"
                  KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
                  mkdir -p "$KEY_DIR"
                  echo -n "$ASC_PRIVATE_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
                  chmod 600 "$KEY_PATH"
                  xcrun altool --upload-app -f "$RUNNER_TEMP/build/fitbox.ipa" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
