name: 'Build iOS app'

on:
    workflow_dispatch:

jobs:
    build_with_signing:
        runs-on: macos-latest
        steps:
            - name: check Xcode version
              run: /usr/bin/xcodebuild -version
            - name: checkout repository
              uses: actions/checkout@v4
            - name: Install the Apple certificate and provisioning profile
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERT_BASE64 }}
                  P12_PASSWORD: ${{ secrets.IOS_BUILD_CERT_PASSWORD }}
                  PROVISION_PROFILES_BASE64: ${{ secrets.IOS_PROVISION_PROFILES_BASE64 }}
                  KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                  PP_ARCHIVE=$RUNNER_TEMP/mobile_pp.tgz
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                  echo -n "$PROVISION_PROFILES_BASE64" | base64 --decode -o $PP_ARCHIVE

                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

                  mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                  tar xzvf $PP_ARCHIVE -C $RUNNER_TEMP
                  for PROVISION in `ls $RUNNER_TEMP/*.mobileprovision`
                  do
                    UUID=`/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PROVISION)`
                    cp $PROVISION ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
                  done

                  security find-identity -v -p codesigning
                  ls -l ~/Library/MobileDevice/Provisioning\ Profiles

            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'yarn'

            - name: Clean workspace
              run: |
                  git clean -ffdx
                  npm cache clean --force

            - name: Clean Derived Data
              run: |
                  rm -rf ~/Library/Developer/Xcode/DerivedData/*

            - name: Set Xcode build number
              run: |
                  bash scripts/increment_build_number.sh
              id: build_number

            - name: Clean Xcode Build
              run: |
                  cd ios
                  xcodebuild clean -workspace fitbox.xcworkspace -scheme fitbox

            - name: install yarn dependencies
              run: yarn install --frozen-lockfile

            - name: Validate JavaScript
              run: |
                  yarn check-types
                  yarn lint
                  yarn test --runInBand

            - name: Update Bundler and Install Gems
              run: |
                  gem update --system
                  gem install bundler
                  bundle install

            - name: Clear Bundler Cache
              run: |
                  bundle clean --force
                  rm -rf ~/.bundle/cache

            - name: Install Pod Dependencies
              run: |
                  echo "RCT_NEW_ARCH_ENABLED: $RCT_NEW_ARCH_ENABLED"
                  which bundle
                  bundle --version
                  which pod
                  pod --version
                  cd ios
                  pod repo update
                  RCT_NEW_ARCH_ENABLED=1 bundle exec pod install --verbose

            - name: build archive
              run: |
                  cd ios
                  xcodebuild -workspace fitbox.xcworkspace \
                  -scheme "fitbox" \
                  -sdk iphoneos \
                  -configuration Release \
                  -allowProvisioningUpdates \
                  -destination generic/platform=iOS \
                  -archivePath $RUNNER_TEMP/fitbox.xcarchive \
                  DEVELOPMENT_TEAM=72JFN8S92U \
                  archive

            - name: export ipa
              env:
                  EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
              run: |
                  EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
                  echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH
                  xcodebuild -exportArchive -archivePath $RUNNER_TEMP/fitbox.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath $RUNNER_TEMP/build

            - name: Upload application
              uses: actions/upload-artifact@v4
              with:
                  name: FITBOXV2
                  path: ${{ runner.temp }}/build
                  retention-days: 3

            - name: Publish to TestFlight
              env:
                  USERNAME: ${{ secrets.APPLE_ID }}
                  PASSWORD: ${{ secrets.APPLE_SPECIFIC_PASSWORD }}
              run: |
                  cd ios && xcrun altool --upload-app -f $RUNNER_TEMP/build/fitbox.ipa -t ios -u $USERNAME -p $PASSWORD
